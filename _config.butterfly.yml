# Navigation bar
nav:
  logo:
  display_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  列表||fas fa-list:
    音乐: /music/ || fas fa-music
    电影: /movies/ || fas fa-video
  留言板: /comments/ || fas fa-envelope-open
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# Code Blocks
highlight_theme: light
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: false

# Social
social:
  fab fa-github: https://github.com/qixingovo || Github || '#24292e'
  fas fa-envelope: mailto:qixingovo@gmail.com || Email || '#4a7dbe'

# Image
favicon: /img/ymb2.png
avatar:
  img: /img/ymb3.png
  effect: false

# Default cover images
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both
  default_cover:
    - /img/default_cover/p1.jpg
    - /img/default_cover/p2.jpg
    - /img/default_cover/p3.jpg
    - /img/default_cover/p4.jpg
    - /img/default_cover/p5.jpg

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# 404 page
error_404:
  enable: true
  subtitle: 'Page Not Found'
  background: /img/default_cover/p5.jpg

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

index_post_content:
  method: 2
  length: 200

# Copyright
post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# TOC
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

# Post pagination
post_pagination: 1

# Outdated notice
noticeOutdate:
  enable: true
  style: flat
  limit_day: 365
  position: top
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# Footer
footer:
  owner:
    enable: true
    since: 2025
  custom_text:
  copyright: false

# Aside
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/qixingovo
  card_announcement:
    enable: true
    content: 欢迎来到我的博客
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# Busuanzi
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# Comments
comments:
  use: Waline
  lazyload: true
  count: true

waline:
  serverURL: https://www.qixingovo.cn/waline
  lang: zh-CN
  emoji: true
  dark: auto
  meta: ['nick', 'mail', 'link']
  requiredMeta: ['nick', 'mail']
  login: enable
  wordLimit: 0
  pageSize: 10
  imageUploader: false

# Translate
translate:
  enable: true
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '简'

# Read mode
readmode: true

# Dark mode
darkmode:
  enable: true
  button: true
  autoChangeMode: false

# Right side scroll percent
rightside_scroll_percent: true

# Share
sharejs:
  enable: true
  sites: facebook,twitter,wechat,weibo,qq

# Performance
lazyload:
  enable: true
  field: site

instantpage: true

# Typography
pangu:
  enable: true
  field: site

# Notifications
snackbar:
  enable: true
  position: bottom-left
  bg_light: '#4facfe'
  bg_dark: '#1f1f1f'

# Background Animation
canvas_nest:
  enable: true
  color: '0,0,255'
  opacity: 0.7
  zIndex: -1
  count: 99
  mobile: false

# Typewriter subtitle
subtitle:
  enable: true
  effect: true
  source: false
  sub:
    - 记录技术成长，分享开发心得

# Word count
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Footer runtime
runtimeshow:
  enable: true
  publish_date: 2026-02-19

# Inject custom CSS/JS
inject:
  head:
    - <link rel="stylesheet" href="/css/var.css">
    - <link rel="stylesheet" href="/css/custom.css">
    - <link rel="stylesheet" href="/css/reference.css">
  bottom:
    - <script src="/js/custom.js"></script>

# CDN — 本地托管所有第三方资源
CDN:
  third_party_provider: jsdelivr
  option:
    lazyload: /lib/lazyload.iife.min.js
    instantpage: /lib/instantpage.min.js
    pangu: /lib/pangu.min.js
    fancybox: /lib/fancybox.umd.min.js
    fancybox_css: /lib/fancybox.min.css
    snackbar: /lib/snackbar.min.js
    snackbar_css: /lib/snackbar.min.css
    sharejs: /lib/social-share.min.js
    sharejs_css: /lib/share.min.css
    fontawesome: /lib/fontawesome/css/all.min.css
    canvas_nest: /lib/canvas-nest.min.js
